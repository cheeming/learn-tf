spec:
  inputs:
    schedule_job:
      type: string
      default: ''
    ss_location:
      type: string
      default: 'tokyo'
---
_ss_tf_base:
  stage: deploy
  environment: ss_production
  resource_group: ss_production
  image:
    name: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/hashicorp/terraform:1.12
    entrypoint: [""]
  variables:
    TF_STATE_NAME: aws-instances
    TF_BACKEND_USERNAME: gitlab-ci-token
  before_script:
    - cd ${TF_STATE_NAME}
    - terraform init -backend-config="address=https://gitlab.com/api/v4/projects/71332047/terraform/state/${TF_STATE_NAME}" -backend-config="lock_address=https://gitlab.com/api/v4/projects/71332047/terraform/state/${TF_STATE_NAME}/lock" -backend-config="unlock_address=https://gitlab.com/api/v4/projects/71332047/terraform/state/${TF_STATE_NAME}/lock" -backend-config="username=${TF_BACKEND_USERNAME}" -backend-config="password=${CI_JOB_TOKEN}" -backend-config="lock_method=POST" -backend-config="unlock_method=DELETE" -backend-config="retry_wait_min=5"
  script:
    - terraform plan -target=module.shadowsock_$[[ inputs.ss_location ]].aws_instance.ec2_server
  rules:
    - when: never

_ss_dns_base:
  extends: _ss_tf_base
  variables:
    TF_STATE_NAME: www.cheeming.com

ss_tf_apply:
  extends: _ss_tf_base
  script:
    - terraform apply -auto-approve -target=module.shadowsock_$[[ inputs.ss_location ]].aws_instance.ec2_server
    - |
      OUTPUT_NAME="$[[ inputs.ss_location ]]_instance_public_ip"
      IP_ADDRESS="$(terraform output -raw "$OUTPUT_NAME")"
      ENV_VAR="TF_VAR_ss_$[[ inputs.ss_location ]]_ipaddress"
      printf '%s=%s\n' "$ENV_VAR" "$IP_ADDRESS" > ss_ip.env
      printf '%s=%s\n' "SS_IP_ADDRESS" "$IP_ADDRESS" >> ss_ip.env
  artifacts:
    reports:
      dotenv: ${TF_STATE_NAME}/ss_ip.env
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && "$[[ inputs.schedule_job ]]" == 'ss_tf_apply'
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: manual

ss_connectivity_check:
  stage: deploy
  image:
    name: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/alpine:3.20
    entrypoint: [""]
  needs:
    - job: ss_tf_apply
      artifacts: true
  script:
    - apk add --no-cache netcat-openbsd
    - cd aws-instances
    - ./scripts/test_connect_ss.sh "$SS_IP_ADDRESS"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && "$[[ inputs.schedule_job ]]" == 'ss_tf_apply'
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: delayed
      start_in: 90 seconds

ss_dns_apply:
  extends: _ss_dns_base
  needs:
    - job: ss_connectivity_check
      artifacts: true
  script:
    - |
      TARGET_RESOURCE="aws_route53_record.tmpsc_ss_$[[ inputs.ss_location ]]"
      export TF_VAR_ss_active_location="$[[ inputs.ss_location ]]"
      terraform apply -auto-approve -target="$TARGET_RESOURCE" -target="aws_route53_record.tmpsc_ss_active"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && "$[[ inputs.schedule_job ]]" == 'ss_tf_apply'
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: on_success

ss_tf_destroy:
  extends: _ss_tf_base
  script:
    - terraform destroy -auto-approve -target=module.shadowsock_$[[ inputs.ss_location ]].aws_instance.ec2_server
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && "$[[ inputs.schedule_job ]]" == 'ss_tf_destroy'
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: manual
